# Global variables for detecting if the display needs to be refreshed. (Thanks @paviro!)
globals:
  - id: require_update_display
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: initial_data_received
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: display_last_update
    type: long long int
    initial_value: '0'
  - id: recorded_display_refresh
    type: int
    restore_value: yes
    initial_value: '0'

# Check whether the display needs to be refreshed every 30s,
# based on whether new data is received or motion is detected. (Thanks @paviro!)
time:
  - platform: sntp
    id: sntp_time
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 30
        then:
          - script.execute: check_display_last_update
          - script.execute: check_if_update_display_required

# Script for updating screen - Refresh display and publish refresh count and time. (Thanks @paviro!)
script:
  - id: check_display_last_update
    then:
      - if:
          condition:
            binary_sensor.is_on: bewegungssensor_kuche_oder_eingang
          then:
            - if:
                condition:
                  lambda: 'return id(display_last_update) < id(sntp_time).now().timestamp - (30 * 60);'
                then:
                  - logger.log: 'Interval checking, update display'
                  - lambda: 'id(require_update_display) = true;'

  - id: check_if_update_display_required
    then: 
      - if:
          condition:
            lambda: 'return id(require_update_display) == true;'
          then:
            - if:
                condition:
                  binary_sensor.is_on: bewegungssensor_kuche_oder_eingang
                then:
                  - logger.log: "Sensor data updated and activity in home detected: Refreshing display..."
                  - script.execute: update_display
                else:
                  - logger.log: "Sensor data updated but no activity in home - skipping display refresh."
          else:
            - logger.log: "No sensors updated - skipping display refresh." 

  - id: update_display
    then:
      - lambda: |-
            id(require_update_display) = false;
            id(display_last_update) = id(sntp_time).now().timestamp;
      - component.update: eink_display
      - lambda: 'id(recorded_display_refresh) += 1;'

